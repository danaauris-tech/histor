<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Historia - Muerte Súbita</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h1 { color: #1a73e8; font-size: 1.5rem; }
        .progress { font-size: 0.9rem; color: #666; margin-bottom: 1rem; }
        #question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 1.5rem; color: #333; }
        .options-container { display: grid; gap: 10px; }
        button { padding: 12px; border: 2px solid #1a73e8; background: white; color: #1a73e8; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
        button:hover { background: #1a73e8; color: white; }
        .error-msg { color: #d93025; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Trivia: Historia y Poblamiento</h1>
    <div class="progress" id="progress">Pregunta 1 de 45</div>
    <div id="question-text">Cargando pregunta...</div>
    <div class="options-container" id="options"></div>
    <div class="error-msg" id="error-msg">¡Respuesta incorrecta! Reiniciando y barajando...</div>
</div>

<script>
    const allQuestions = [
        // BLOQUE 1
        { q: "¿Dónde surge el ser humano por primera vez?", a: "África", alt: ["Asia", "América"] },
        { q: "¿En qué periodo geológico ocurrió el poblamiento americano?", a: "Pleistoceno", alt: ["Holoceno", "Jurásico"] },
        { q: "¿Cuál de estos animales NO es parte de la megafauna mencionada?", a: "Dinosaurio", alt: ["Megaterio", "Paleollama"] },
        { q: "Característica del hombre primitivo:", a: "Nómade", alt: ["Sedentario", "Agricultor"] },
        { q: "¿Quién propuso la teoría autoctonista?", a: "Florentino Ameghino", alt: ["Alex Hrdlicka", "Julio C. Tello"] },
        { q: "¿Dónde decía Ameghino que se originó la humanidad?", a: "Argentina", alt: ["Perú", "México"] },
        { q: "Autor de la teoría de origen asiático:", a: "Alex Hrdlicka", alt: ["Federico Engel", "Ruth Shady"] },
        { q: "Ruta de la teoría asiática:", a: "Estrecho de Bering", alt: ["Océano Pacífico", "Groenlandia"] },
        { q: "Causa del descenso del nivel del mar:", a: "Glaciación de Wisconsin", alt: ["Calentamiento Global", "Terremotos"] },
        { q: "Evidencia antropológica asiática:", a: "Mancha mongólica", alt: ["Piel oscura", "Estatura muy alta"] },
        { q: "Sustento geográfico de la teoría asiática:", a: "Cercanía Asia-América", alt: ["Puente transatlántico", "Canal de Panamá"] },
        // BLOQUE 2
        { q: "Permitieron el sedentarismo:", a: "Agricultura y Ganadería", alt: ["Pesca y Caza", "Comercio"] },
        { q: "Origen de las clases sociales:", a: "Excedente productivo", alt: ["Guerra", "Religión"] },
        { q: "Gobernaban en el Arcaico Superior:", a: "Sacerdotes Astrónomos", alt: ["Guerreros", "Comerciantes"] },
        { q: "Tipo de estado en el Arcaico Superior:", a: "Teocrático", alt: ["Militarista", "Democrático"] },
        { q: "Descubridor de Cerro Paloma:", a: "Federico Engel", alt: ["Junius Bird", "Ruth Shady"] },
        { q: "Centro ceremonial más antiguo de América:", a: "Caral", alt: ["Chavín", "Kotosh"] },
        { q: "Descubridora de Caral:", a: "Ruth Shady", alt: ["Seichi Izumi", "Max Uhle"] },
        { q: "Ubicación de Huaca Prieta:", a: "La Libertad", alt: ["Lima", "Áncash"] },
        { q: "Hallazgo en Huaca Prieta:", a: "Mates pirograbados", alt: ["Cabezas clavas", "Lanzón"] },
        { q: "Templo de las Manos Cruzadas:", a: "Kotosh", alt: ["Caral", "Sechín"] },
        { q: "Descubrió Kotosh:", a: "Seichi Izumi", alt: ["Julio C. Tello", "Federico Engel"] },
        // BLOQUE 3
        { q: "Periodificación de John Rowe se basa en:", a: "Distribución económica", alt: ["Arquitectura", "Cerámica polícroma"] },
        { q: "Definición de Horizonte:", a: "Gran extensión", alt: ["Pequeña extensión", "Solo selva"] },
        { q: "Definición de Intermedio:", a: "Menor extensión", alt: ["Cultura matriz", "Imperio mundial"] },
        { q: "Lumbreras se basa en el aspecto:", a: "Socio-económico", alt: ["Religioso", "Geográfico"] },
        { q: "Característica del Horizonte Temprano:", a: "Estado teocrático", alt: ["Estado militar", "Democracia"] },
        { q: "Actividad principal en Chavín:", a: "Agricultura", alt: ["Industria", "Navegación"] },
        { q: "Chavín es la 'Cultura Matriz' según:", a: "Julio C. Tello", alt: ["Max Uhle", "John Rowe"] },
        { q: "Ubicación de Chavín de Huántar:", a: "Áncash", alt: ["Ayacucho", "Cusco"] },
        { q: "Trilogía Chavín:", a: "Jaguar, Cóndor, Serpiente", alt: ["Llama, Alpaca, Cuy", "Sol, Luna, Estrellas"] },
        { q: "Deidad Chavín más importante:", a: "Dios de los Báculos", alt: ["Ai Apaec", "Wiracocha"] },
        { q: "Cerámica Chavín:", a: "Monócroma", alt: ["Polícroma", "Bícroma"] },
        { q: "Escultura de Chavín:", a: "Estela Raimondi", alt: ["Huaco Retrato", "Manto"] },
        { q: "Función de Cabezas Clavas:", a: "Asustar espíritus", alt: ["Decoración simple", "Guardar granos"] },
        // BLOQUE 4
        { q: "Paracas es una cultura de:", a: "Transición", alt: ["Origen asiático", "Decadencia total"] },
        { q: "Paracas Cavernas tiene tumbas en:", a: "Copa invertida", alt: ["Forma rectangular", "Pirámides"] },
        { q: "Paracas Necrópolis tiene tumbas:", a: "Rectangulares", alt: ["Circulares", "Pozo profundo"] },
        { q: "Técnica cerámica en Necrópolis:", a: "Pre-cocción", alt: ["Post-cocción", "Sin pintura"] },
        { q: "Médicos de Paracas hacían:", a: "Trepanaciones", alt: ["Cirugías de corazón", "Vacunas"] },
        { q: "Las cabezas trofeo indicaban:", a: "Estatus social-militar", alt: ["Amistad", "Deformidad"] },
        { q: "En el Intermedio Temprano surge:", a: "Clase guerrera", alt: ["El monoteísmo", "La moneda"] },
        { q: "Descubridor de Mochica:", a: "Max Uhle", alt: ["Julio C. Tello", "Federico Engel"] },
        { q: "Huacos que muestran emociones:", a: "Retratos", alt: ["Patológicos", "Eroticos"] },
        { q: "Dios principal Mochica:", a: "Ai Apaec", alt: ["Dios de los Báculos", "Jaguar"] }
    ];

    let currentQuestionIndex = 0;
    let shuffledQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        shuffledQuestions = shuffle([...allQuestions]);
        currentQuestionIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('error-msg').style.display = 'none';
        const qData = shuffledQuestions[currentQuestionIndex];
        document.getElementById('progress').innerText = `Pregunta ${currentQuestionIndex + 1} de ${shuffledQuestions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        const choices = shuffle([qData.a, ...qData.alt]);
        
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, qData.a);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        if (selected === correct) {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                showQuestion();
            } else {
                alert("¡FELICIDADES! Has completado las 45 preguntas sin fallar.");
                initGame();
            }
        } else {
            document.getElementById('error-msg').style.display = 'block';
            setTimeout(() => {
                initGame(); // Reinicia y baraja todo
            }, 1500);
        }
    }

    initGame();
</script>

</body>
</html>
